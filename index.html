<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>رادار المقابلة الشفوية 2026 - الاحترافي</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff0055; --dark-bg: #050505; }
        * { box-sizing: border-box; }
        body { background: var(--dark-bg); color: #fff; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; direction: rtl; overflow-x: hidden; }

        /* الشريط المتحرك العلوي */
        .marquee-container { 
            background: rgba(0, 242, 255, 0.05); border-bottom: 1px solid var(--neon-blue); 
            padding: 10px 0; overflow: hidden; white-space: nowrap; margin-bottom: 20px; 
        }
        .marquee-text { 
            display: inline-block; animation: marquee 20s linear infinite; 
            color: var(--neon-blue); font-size: 1.1rem; font-weight: bold; text-shadow: 0 0 10px var(--neon-blue); 
        }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .glass-container {
            background: rgba(15, 15, 15, 0.95); border: 2px solid #222; border-radius: 20px;
            padding: 20px; width: 95%; max-width: 850px; margin: auto;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }

        .main-title { text-align: center; font-size: 1.8rem; margin-bottom: 20px; color: var(--neon-blue); }
        .main-title span { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }

        /* القوائم المتجاوبة للهاتف */
        .grid-nav { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .nav-card { background: #111; padding: 10px; border-radius: 12px; border: 1px solid #333; }
        .nav-card label { display: block; font-size: 0.8rem; color: var(--neon-pink); margin-bottom: 5px; }
        select { width: 100%; background: #000; color: #fff; border: 1px solid var(--neon-blue); padding: 10px; border-radius: 8px; font-family: 'Tajawal'; outline: none; }

        /* منطقة السؤال */
        .question-display {
            background: #000; padding: 40px 15px; border: 2px solid #333; border-radius: 15px;
            font-size: clamp(1.2rem, 5vw, 1.7rem); line-height: 1.6; color: #fff;
            margin-bottom: 20px; text-align: center; font-weight: 900;
            border-right: 12px solid var(--neon-blue); box-shadow: inset 0 0 20px rgba(0,242,255,0.05);
        }

        /* الميكروفون ومنطقة الكتابة */
        .input-wrapper { position: relative; width: 100%; }
        textarea {
            width: 100%; height: 140px; background: #0a0a0a; border: 1px solid #444;
            border-radius: 12px; color: #fff; padding: 15px; font-size: 1.1rem;
            outline: none; transition: 0.3s; resize: none;
        }
        .mic-btn {
            position: absolute; bottom: 15px; left: 15px;
            background: #222; border: 1px solid var(--neon-blue); border-radius: 50%;
            width: 45px; height: 45px; cursor: pointer; color: var(--neon-blue);
            display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
            transition: 0.3s;
        }
        .mic-btn.active { background: var(--neon-pink); color: #fff; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .action-bar { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 18px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border: none; }
        .btn-new { background: #fff; color: #000; }
        .btn-check { background: var(--neon-pink); color: #fff; }

        /* صندوق LCD للنتائج */
        .lcd-box { margin-top: 20px; padding: 20px; border-radius: 15px; border: 2px solid; display: none; }
        .lcd-success { border-color: var(--neon-blue); color: var(--neon-blue); background: rgba(0,242,255,0.05); }
        .lcd-error { border-color: var(--neon-pink); color: var(--neon-pink); background: rgba(255,0,85,0.05); }

        @media (max-width: 600px) {
            .grid-nav { grid-template-columns: 1fr; }
            .action-bar { flex-direction: column; }
            .main-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="marquee-container">
    <div class="marquee-text">نظام رادار المقابلة الشفوية 2026 مفعّل ... 210 سؤال بانتظارك ... بالتوفيق للجميع</div>
</div>

<div class="glass-container">
    <h1 class="main-title">رادار <span>المقابلة الشفوية</span> 2026</h1>

    <div class="grid-nav">
        <div class="nav-card">
            <label>1. الجانب الشخصي</label>
            <select id="sel-personal" onchange="switchSection('personal', this.value)">
                <option value="0">التعريف بالهوية (15 سؤال)</option>
                <option value="1">أخلاقيات المهنة (15 سؤال)</option>
            </select>
        </div>
        <div class="nav-card">
            <label>2. البيداغوجيا</label>
            <select id="sel-pedagogy" onchange="switchSection('pedagogy', this.value)">
                <option value="0">الأساسيات (15 سؤال)</option>
                <option value="1">التخطيط (15 سؤال)</option>
                <option value="2">تشريع 1 (15 سؤال)</option>
                <option value="3">تشريع 2 (15 سؤال)</option>
            </select>
        </div>
        <div class="nav-card">
            <label>3. الرياضيات</label>
            <select id="sel-math" onchange="switchSection('math', this.value)">
                <option value="0">جبر وحساب (15 سؤال)</option>
                <option value="1">هندسة 1 (15 سؤال)</option>
                <option value="2">هندسة وإحصاء (15 سؤال)</option>
                <option value="3">هندسة فضاء (15 سؤال)</option>
                <option value="4">تكنولوجيا (15 سؤال)</option>
            </select>
        </div>
        <div class="nav-card">
            <label>4. إدارة القسم</label>
            <select id="sel-management" onchange="switchSection('management', this.value)">
                <option value="0">إدارة ومواقف (15 سؤال)</option>
                <option value="1">صعوبات التعلم (15 سؤال)</option>
                <option value="2">الأولياء والمحيط (15 سؤال)</option>
            </select>
        </div>
    </div>

    <div class="question-display" id="q-text">اختر القسم ثم اضغط "سؤال جديد"</div>
    
    <div class="input-wrapper">
        <textarea id="user-input" placeholder="اكتب إجابتك هنا أو استخدم الميكروفون..."></textarea>
        <button class="mic-btn" id="mic-btn" onclick="startVoiceRecognition()">🎤</button>
    </div>

    <div class="action-bar">
        <button class="btn btn-new" onclick="getNewQuestion()">سؤال جديد ⮕</button>
        <button class="btn btn-check" onclick="checkResponse()">تحليل الإجابة 📊</button>
    </div>

    <div id="feedback-area" class="lcd-box"></div>
</div>

<script src="script.js"></script>
</body>
</html>
